<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ぽっカフェ 注文</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
</head>
<body class="animate-in bg-gray-50">

    <header id="main-header" class="hidden bg-white/80 sticky top-0 z-40 border-b p-4 flex justify-between items-center backdrop-blur-md">
        <div class="flex flex-col">
            <h1 class="text-lg font-black text-orange-600 leading-none">ぽっカフェ</h1>
            <p id="userDisplay" class="text-[10px] text-gray-400 mt-1">ログイン中: --様</p>
        </div>
        <div class="flex gap-2">
            <button onclick="router.go('history')" class="text-[11px] font-bold text-gray-500 bg-gray-100 px-3 py-2 rounded-full">履歴</button>
            <button onclick="app.logout()" class="text-[11px] font-bold text-red-500 bg-red-50 px-3 py-2 rounded-full">ログアウト</button>
        </div>
    </header>

    <main id="app">
        <section id="view-login" class="view min-h-screen flex flex-col justify-center p-6 animate-in">
            <div class="text-center mb-8">
                <div class="w-24 h-24 bg-orange-100 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-3">
                    <span class="text-4xl">☕</span>
                </div>
                <h2 class="text-3xl font-black text-gray-800">ぽっカフェ</h2>
                <p class="text-gray-400 mt-2">おいしい時間を、事前注文で。</p>
            </div>

            <div class="space-y-4 max-w-sm mx-auto w-full">
                <div class="bg-white p-2 rounded-3xl shadow-sm border border-gray-100">
                    <label class="text-[10px] font-bold text-gray-400 ml-4 uppercase">Email Address</label>
                    <input type="email" id="login-email" class="w-full px-4 pb-2 bg-transparent border-0 focus:ring-0 text-lg focus:outline-none" placeholder="example@mail.com">
                </div>
                <div class="bg-white p-2 rounded-3xl shadow-sm border border-gray-100">
                    <label class="text-[10px] font-bold text-gray-400 ml-4 uppercase">Password</label>
                    <input type="password" id="login-password" class="w-full px-4 pb-2 bg-transparent border-0 focus:ring-0 text-lg focus:outline-none" placeholder="••••••••">
                </div>

                <div class="text-right px-2">
                    <button onclick="app.showForgotPassword()" class="text-xs font-bold text-orange-500 hover:underline">パスワードをお忘れの方</button>
                </div>

                <button onclick="app.login()" class="w-full bg-orange-500 text-white py-4 rounded-3xl font-bold shadow-lg shadow-orange-200 active:scale-95 transition-transform">
                    ログインして注文する
                </button>
                
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
                    <div class="relative flex justify-center text-xs"><span class="bg-gray-50 px-4 text-gray-400 font-medium">初めての方</span></div>
                </div>

                <button onclick="app.showRegister()" class="w-full bg-white text-gray-600 py-4 rounded-3xl font-bold shadow-sm border border-gray-200 active:bg-gray-50">
                    新規アカウント作成
                </button>
            </div>
        </section>

        <section id="view-home" class="view p-4 hidden animate-in">
            <div id="go-to-admin-btn" class="hidden p-4 bg-yellow-50 border-b border-yellow-200 text-center">
                <button onclick="router.go('admin')" class="bg-yellow-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-yellow-700 transition">
                    ⚙️ 管理者画面へ移行する
                </button>
            </div>
            <div class="mb-6">
                <div id="admin-customer-selector-wrapper" class="hidden"></div>
                <div id="upcoming-reservations-container" class="hidden">
                    <div class="bg-gradient-to-br from-amber-50 to-emerald-50 border border-emerald-100 rounded-3xl p-5 shadow-sm">
                        <h3 class="text-sm font-black text-emerald-800 flex items-center mb-3">
                            <span class="flex h-2 w-2 relative mr-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                            </span>
                            あなた（または代理）の今後のご予約内容
                        </h3>
                        <div id="upcoming-reservations-list" class="space-y-4">
                            </div>
                    </div>
                </div>
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-2 block ml-1">受取希望日</label>
                <div class="w-full">
                    <label class="block text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1.5">受取希望日を選択してください</label>
                    <input type="text" id="order-date" class="hidden">
                    <div id="inline-calendar-container" class="mt-2 flex justify-center"></div>
                </div>
            </div>
            <div id="menu-list" class="space-y-4 pb-20"></div>
        </section>

        <section id="view-admin" class="view p-4 hidden animate-in">
            <!-- ここにJavaScriptから管理画面の中身が注入されます -->
        </section>

        <section id="view-customer-edit" class="view hidden min-h-screen pt-4 pb-24">
            <!-- 顧客編集画面の内容 -->
        </section>

        <!-- メニュー編集用のセクションも下に並べて追加しておいてください -->
        <section id="view-menu-edit" class="view p-4 hidden animate-in">
            <!-- メニュー登録・編集画面の中身（前述の menuEditView.render() の内容） -->
        </section>
        
        <section id="view-holiday-edit" class="view p-4 hidden animate-in">
            <!-- 休日設定画面の中身（前述の holidayEditView.render() の内容） -->
        </section>

        
    </main>

    <div id="cart-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg p-4 pb-8 z-50 border-t border-gray-100">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div class="flex-1">
                <p id="cart-total-display" class="text-2xl font-black text-orange-600">¥0</p>
            </div>
            <button onclick="app.confirmOrder()" class="bg-orange-500 text-white font-bold px-10 py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                注文を確認
            </button>
        </div>
    </div>

    <div id="register-modal" class="hidden fixed inset-0 z-[70] flex items-end">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="app.closeRegister()"></div>
        <div class="relative bg-white w-full rounded-t-[32px] p-8 animate-slide-up max-w-md mx-auto">
            <h3 class="text-xl font-bold mb-6">アカウント作成</h3>
            <div class="space-y-4 mb-8">
                <input type="text" id="reg-name" placeholder="お名前" class="w-full p-4 rounded-xl bg-gray-50 focus:outline-none">
                <input type="email" id="reg-email" placeholder="メールアドレス" class="w-full p-4 rounded-xl bg-gray-50 focus:outline-none">
                <input type="tel" id="reg-tel" placeholder="電話番号" class="w-full p-4 rounded-xl bg-gray-50 focus:outline-none">
                <input type="password" id="reg-password" placeholder="パスワード（必須）" class="w-full p-4 rounded-xl bg-gray-50 focus:outline-none">
            </div>
            <button onclick="app.submitRegister()" id="reg-submit-btn" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold">認証メールを送る</button>
        </div>
    </div>

    <div id="forgot-modal" class="hidden fixed inset-0 z-[70] flex items-end">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="app.closeForgotPassword()"></div>
        <div class="relative bg-white w-full rounded-t-[32px] p-8 animate-slide-up max-w-md mx-auto">
            <h3 class="text-xl font-bold mb-2">パスワードの再設定</h3>
            <p class="text-xs text-gray-400 mb-6">登録しているメールアドレスへ再設定リンクを送信します。</p>
            <div class="space-y-4 mb-8">
                <input type="email" id="forgot-email" placeholder="example@mail.com" class="w-full p-4 rounded-xl bg-gray-50 focus:outline-none">
            </div>
            <button onclick="app.submitForgotPassword()" id="forgot-submit-btn" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold">再設定メールを送る</button>
        </div>
    </div>

    <div id="reset-modal" class="hidden fixed inset-0 z-[80] flex items-end">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full rounded-t-[32px] p-8 animate-slide-up max-w-md mx-auto">
            <h3 class="text-xl font-bold mb-2">新しいパスワードの設定</h3>
            <p class="text-xs text-gray-400 mb-6">新しいパスワードを決定してください。</p>
            <div class="space-y-4 mb-8">
                <input type="password" id="reset-new-password" placeholder="新しいパスワード" class="w-full p-4 rounded-xl bg-gray-50 focus:outline-none">
            </div>
            <button onclick="app.submitResetPassword()" id="reset-submit-btn" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold">パスワードを更新する</button>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-end">
        <div class="absolute inset-0 bg-black/40" onclick="app.closeModal()"></div>
        <div class="relative bg-white w-full rounded-t-[32px] p-8 animate-slide-up">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <h3 class="text-xl font-black mb-6">注文内容の確認</h3>
            <div id="modal-content" class="max-h-[40vh] overflow-y-auto mb-8 hide-scrollbar"></div>
            <button onclick="app.submitOrder()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg">注文を確定する</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
